name: Build Native (desktop)

on:
  push:
    branches: ["release/**"]
    paths:
      - "src/Native/**"
      - "build/ci/**"
      - ".github/workflows/build-native.yml"
  pull_request:
    paths:
      - "src/Native/**"
      - "build/ci/**"
      - ".github/workflows/build-native.yml"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    # Optional RIDs must not block pack if the toolchain is unavailable on the runner.
    continue-on-error: ${{ matrix.optional }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            test: true
            optional: false
            cmake_extra: ""
          - os: windows-latest
            rid: win-arm64
            test: false
            optional: true
            # MSVC cross leaves CMAKE_SYSTEM_PROCESSOR as host AMD64; FastPFOR
            # wrapper needs ARM64 to FetchContent SIMDe (see thirdparty/FastPFOR/CMakeLists.txt).
            cmake_extra: "-DCMAKE_SYSTEM_PROCESSOR=ARM64"
          - os: ubuntu-latest
            rid: linux-x64
            test: true
            optional: false
            cmake_extra: ""
          - os: ubuntu-latest
            rid: linux-arm64
            test: false
            optional: true
            cross: true
            cmake_extra: >-
              -DCMAKE_SYSTEM_NAME=Linux
              -DCMAKE_SYSTEM_PROCESSOR=aarch64
              -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc
              -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++
          - os: macos-latest
            rid: osx-arm64
            test: true
            optional: false
            cmake_extra: "-DCMAKE_OSX_ARCHITECTURES=arm64"
          - os: macos-14
            rid: osx-x64
            test: true
            optional: true
            cmake_extra: "-DCMAKE_OSX_ARCHITECTURES=x86_64"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake build-essential
          if [ "${{ matrix.rid }}" = "linux-arm64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu qemu-user
          fi

      - name: Install macOS build tools
        if: runner.os == 'macOS'
        run: brew install ninja cmake || true

      - name: Install Windows Ninja
        if: runner.os == 'Windows'
        run: choco install ninja -y

      # Ninja on Windows needs cl/link on PATH (Developer Command Prompt).
      - name: Setup MSVC (x64)
        if: matrix.rid == 'win-x64'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup MSVC (arm64 cross)
        if: matrix.rid == 'win-arm64'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_arm64

      # Cross-build produces ARM64 protoc.exe which cannot run on the x64 host
      # ("not compatible with the version of Windows you're running"). Same class
      # of bug as Android Exec format error — use a host win64 protoc instead.
      - name: Download host protoc (win-arm64)
        if: matrix.rid == 'win-arm64'
        shell: pwsh
        run: |
          $dest = "D:/b/host-protoc"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          $zip = Join-Path $dest "protoc-21.12-win64.zip"
          $url = "https://github.com/protocolbuffers/protobuf/releases/download/v21.12/protoc-21.12-win64.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          $protoc = Join-Path $dest "bin/protoc.exe"
          if (-not (Test-Path $protoc)) { throw "Host protoc missing at $protoc" }
          & $protoc --version
          Write-Host "HOST_PROTOC=$protoc"

      # Cannot commit into alibaba/zvec; apply local workaround patches before configure.
      - name: Patch zvec CI workarounds (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $zvec = "src/Native/ZVec.Native/external/zvec"
          $arrow = Join-Path $zvec "thirdparty/arrow/apache-arrow-21.0.0"
          $ninja = Join-Path $env:GITHUB_WORKSPACE "build/ci/patches/zvec-arrow-msvc-ninja.patch"
          $pcg = Join-Path $env:GITHUB_WORKSPACE "build/ci/patches/zvec-arrow-pcg-msvc-arm64.patch"
          git -C $zvec apply --check $ninja
          git -C $zvec apply $ninja
          git -C $arrow apply --check $pcg
          git -C $arrow apply $pcg

      - name: Patch zvec CI workarounds (linux-arm64 Arrow cross)
        if: matrix.rid == 'linux-arm64'
        run: |
          zvec="src/Native/ZVec.Native/external/zvec"
          patch="$GITHUB_WORKSPACE/build/ci/patches/zvec-arrow-linux-aarch64-cross.patch"
          git -C "$zvec" apply --check "$patch"
          git -C "$zvec" apply "$patch"

      - name: Configure CMake (Unix)
        if: runner.os != 'Windows'
        working-directory: src/Native/ZVec.Native
        run: |
          cmake -B "build-${{ matrix.rid }}" -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            ${{ matrix.cmake_extra }} \
            -DBUILD_TESTING=OFF -DBUILD_TOOLS=OFF -DBUILD_EXAMPLES=OFF \
            -DBUILD_PYTHON_BINDINGS=OFF -DBUILD_C_BINDINGS=ON \
            -S .

      # win-x64 and win-arm64 both use Ninja + MSVC from msvc-dev-cmd (not VS generator).
      # Quote 3.5 — unquoted, pwsh splits into "3" and ".5" and CMake fails.
      # Short build root D:/b/{rid}: GHA path under D:/a/<repo>/<repo>/... exceeds
      # CMAKE_OBJECT_PATH_MAX (~250) inside Arrow nested ExternalProjects (zlib/re2).
      # Strip Strawberry ccache from PATH — cold MSVC+ccache stalls CI vs local ~15m builds.
      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        working-directory: src/Native/ZVec.Native
        shell: pwsh
        env:
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
          CMAKE_GENERATOR: Ninja
          CCACHE_DISABLE: "1"
        run: |
          $env:PATH = (
            $env:PATH -split ';' |
            Where-Object { $_ -and ($_ -notmatch '(?i)Strawberry[\\/]c[\\/]bin') }
          ) -join ';'
          if (Get-Command ccache -ErrorAction SilentlyContinue) {
            Write-Host "WARN: ccache still on PATH at $((Get-Command ccache).Source)"
          } else {
            Write-Host "ccache not on PATH (expected)"
          }
          New-Item -ItemType Directory -Force -Path "D:/b" | Out-Null
          $cmakeArgs = @(
            "-B", "D:/b/${{ matrix.rid }}",
            "-G", "Ninja",
            "-DCMAKE_BUILD_TYPE=Release",
            "-DCMAKE_POLICY_VERSION_MINIMUM=3.5",
            "-DBUILD_TESTING=OFF",
            "-DBUILD_TOOLS=OFF",
            "-DBUILD_EXAMPLES=OFF",
            "-DBUILD_PYTHON_BINDINGS=OFF",
            "-DBUILD_C_BINDINGS=ON",
            "-S", "."
          )
          if ("${{ matrix.rid }}" -eq "win-arm64") {
            $hostProtoc = "D:/b/host-protoc/bin/protoc.exe"
            if (-not (Test-Path $hostProtoc)) { throw "Host protoc missing: $hostProtoc" }
            $cmakeArgs += "-DGLOBAL_CC_PROTOBUF_PROTOC=$hostProtoc"
            Write-Host "Using host protoc for win-arm64: $hostProtoc"
          }
          $extraArgs = "${{ matrix.cmake_extra }}".Trim()
          if ($extraArgs) {
            $cmakeArgs += ($extraArgs -split '\s+')
            Write-Host "cmake_extra: $extraArgs"
          }
          & cmake @cmakeArgs

      # Nested ExternalProject cmake (Lz4/Arrow) runs at build time — must inherit policy floor.
      # Fail-fast (no -k 1): one EP failure must not burn the rest of the step timeout.
      - name: Build zvec_c_api (Windows)
        if: runner.os == 'Windows'
        working-directory: src/Native/ZVec.Native
        shell: pwsh
        timeout-minutes: 60
        env:
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
          CMAKE_GENERATOR: Ninja
          CCACHE_DISABLE: "1"
        run: |
          $env:PATH = (
            $env:PATH -split ';' |
            Where-Object { $_ -and ($_ -notmatch '(?i)Strawberry[\\/]c[\\/]bin') }
          ) -join ';'
          $root = "D:/b/${{ matrix.rid }}"
          cmake --build $root --config Release --target zvec_c_api
          exit $LASTEXITCODE

      # Timeout/cancel kills the build step before its dump runs — always dump diagnostics after.
      - name: Dump Windows ExternalProject logs
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          $root = "D:/b/${{ matrix.rid }}"
          Write-Host "##[group]Windows build failure markers / host-tool check"
          Write-Host "Build root: $root  VSCMD_ARG_TGT_ARCH=$env:VSCMD_ARG_TGT_ARCH"
          if (-not (Test-Path $root)) {
            Write-Host "Build root missing: $root"
            Write-Host "##[endgroup]"
            exit 0
          }

          # Cross-compile footgun: target-arch protoc cannot run on the x64 host.
          $protocCandidates = @(
            (Join-Path $root "external/zvec/bin/protoc.exe"),
            (Join-Path $root "external/zvec/bin/protoc-3.21.12.0.exe"),
            "D:/b/host-protoc/bin/protoc.exe"
          ) | Where-Object { Test-Path $_ }
          foreach ($p in $protocCandidates) {
            Write-Host "----- protoc: $p -----"
            try {
              $bytes = [System.IO.File]::ReadAllBytes($p)
              # PE machine at COFF header: e_lfanew @0x3C, Machine @ that+4 (uint16)
              $e_lfanew = [BitConverter]::ToInt32($bytes, 0x3C)
              $machine = [BitConverter]::ToUInt16($bytes, $e_lfanew + 4)
              $arch = switch ($machine) {
                0x8664 { "x64 (AMD64)" }
                0xAA64 { "ARM64" }
                0x14c  { "x86" }
                default { "unknown 0x{0:X4}" -f $machine }
              }
              Write-Host "PE Machine=$arch (0x$('{0:X4}' -f $machine))"
            } catch {
              Write-Host "Could not read PE headers: $_"
            }
          }
          if (-not $protocCandidates -or $protocCandidates.Count -eq 0) {
            Write-Host "No protoc.exe found under build tree or D:/b/host-protoc"
          }
          Write-Host "##[endgroup]"

          Write-Host "##[group]ARROW/Lz4 ExternalProject logs"
          $logs = @(
            Get-ChildItem -Recurse $root -Filter "ARROW.BUILD-*.log" -ErrorAction SilentlyContinue
            Get-ChildItem -Recurse $root -Filter "Lz4.BUILD-*.log" -ErrorAction SilentlyContinue
          )
          if (-not $logs -or $logs.Count -eq 0) {
            Write-Host "No ARROW/Lz4 ExternalProject logs under $root (failure may be outside Arrow/Lz4 — see build step FAILED lines)."
          } else {
            foreach ($log in $logs) {
              Write-Host "===== $($log.FullName) ====="
              Get-Content $log.FullName -ErrorAction SilentlyContinue
            }
          }
          Write-Host "##[endgroup]"

      - name: Build zvec_c_api (Unix)
        if: runner.os != 'Windows'
        working-directory: src/Native/ZVec.Native
        env:
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: cmake --build "build-${{ matrix.rid }}" --config Release --target zvec_c_api

      - name: Dump Unix ExternalProject logs
        if: failure() && runner.os != 'Windows'
        working-directory: src/Native/ZVec.Native
        run: |
          root="build-${{ matrix.rid }}"
          echo "##[group]ARROW/Lz4 ExternalProject logs ($root)"
          if [[ ! -d "$root" ]]; then
            echo "Build root missing: $root"
            echo "##[endgroup]"
            exit 0
          fi
          mapfile -t logs < <(find "$root" \( -name 'ARROW.BUILD-*.log' -o -name 'Lz4.BUILD-*.log' \) 2>/dev/null | sort)
          if [[ ${#logs[@]} -eq 0 ]]; then
            echo "No ARROW/Lz4 ExternalProject logs under $root (see build step FAILED lines)."
          else
            for log in "${logs[@]}"; do
              echo "===== $log ====="
              cat "$log" || true
            done
          fi
          echo "##[endgroup]"

      - name: Locate and deploy native (Unix)
        if: runner.os != 'Windows'
        run: |
          set -e
          BUILD="src/Native/ZVec.Native/build-${{ matrix.rid }}"
          LIB=$(find "$BUILD" \( -name 'libzvec_c_api.so' -o -name 'libzvec_c_api.dylib' -o -name 'zvec_c_api.so' -o -name 'zvec_c_api.dylib' \) | head -n1)
          test -n "$LIB"
          chmod +x build/ci/deploy-native.sh
          ./build/ci/deploy-native.sh "${{ matrix.rid }}" "$LIB"
          if [ "${{ matrix.rid }}" = "linux-arm64" ]; then
            file "$LIB" || true
            # Smoke: ensure aarch64 ELF; full QEMU app test is optional
            file "$LIB" | grep -Ei 'ARM aarch64|ARM64|aarch64' || echo "WARN: file(1) did not confirm aarch64"
          fi

      - name: Locate and deploy native (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $build = "D:/b/${{ matrix.rid }}"
          $lib = Get-ChildItem -Recurse $build -Filter "zvec_c_api.dll" | Select-Object -First 1
          if (-not $lib) { throw "zvec_c_api.dll not found under $build" }
          ./build/ci/deploy-native.ps1 -Rid "${{ matrix.rid }}" -SourcePath $lib.FullName

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: zvec-native-${{ matrix.rid }}
          path: src/Core/ZVec.NET/runtimes/${{ matrix.rid }}/native/*
          if-no-files-found: error
          retention-days: 14
