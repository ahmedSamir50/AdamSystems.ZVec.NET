name: Publish NuGet

# nuget.org publish is release-line only:
# - Tags: v* whose commit is on a release/* branch (guard below).
# - workflow_dispatch: emergency only; prefer tagging on release/* so the same guard applies.
#   When dispatching from the UI, run it from a release/* branch ref when possible.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # NuGet Trusted Publishing (OIDC)

jobs:
  guard-release-line:
    name: require release/* commit
    runs-on: ubuntu-latest
    steps:
      # Tag pushes only fetch the tag by default — pull release/* heads so the guard can see them.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fail unless SHA is on release/*
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          SHA="${GITHUB_SHA}"
          git fetch --no-tags origin '+refs/heads/release/*:refs/remotes/origin/release/*'
          if git branch -r --contains "$SHA" | grep -E 'origin/release/' >/dev/null; then
            echo "OK: $SHA is reachable from a release/* branch."
            git branch -r --contains "$SHA" | grep -E 'origin/release/' || true
            exit 0
          fi
          echo "::error::Publish blocked: commit $SHA is not on any release/* branch."
          echo "Tag or dispatch only from the release train (e.g. release/1.0)."
          echo "event=$EVENT_NAME ref=$REF"
          exit 1

  pack:
    needs: guard-release-line
    uses: ./.github/workflows/pack.yml

  publish:
    name: push to nuget.org
    needs: pack
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/nuget

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: NuGet login (OIDC Trusted Publishing)
        id: login
        uses: NuGet/login@v1
        with:
          user: AdamSystems
        continue-on-error: true

      - name: Push (Trusted Publishing)
        if: steps.login.outcome == 'success'
        run: |
          shopt -s nullglob
          for pkg in artifacts/nuget/*.nupkg; do
            dotnet nuget push "$pkg" \
              --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

      - name: Push (API key fallback)
        if: steps.login.outcome != 'success'
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "${NUGET_API_KEY:-}" ]; then
            echo "Trusted Publishing login failed and NUGET_API_KEY secret is not set." >&2
            exit 1
          fi
          shopt -s nullglob
          for pkg in artifacts/nuget/*.nupkg; do
            dotnet nuget push "$pkg" \
              --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done
