name: Build Managed

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore ZVec.NET.slnx

      - name: Build
        run: dotnet build ZVec.NET.slnx -c Release --no-restore

      - name: Test (unit + skippable integration)
        run: dotnet test testing/ZVec.NET.Tests/ZVec.NET.Tests.csproj -c Release --no-build --logger "trx;LogFileName=test.trx"
        # Integration tests Skip when native is missing — unit tests always run.

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: "**/*.trx"
          if-no-files-found: ignore
