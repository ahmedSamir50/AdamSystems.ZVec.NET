name: Build Managed

on:
  push:
    branches: [main, development, "release/**"]
  pull_request:
  workflow_dispatch:
  workflow_call:
    inputs:
      require_native:
        description: Download desktop native artifact before tests (Pack CI)
        type: boolean
        default: false
        required: false

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      # Pack passes require_native=true after desktop natives upload zvec-native-{rid}.
      - name: Download native for this RID
        if: ${{ inputs.require_native == true }}
        uses: actions/download-artifact@v4
        with:
          name: zvec-native-${{ matrix.rid }}
          path: _native_artifact

      - name: Deploy native into runtimes/
        if: ${{ inputs.require_native == true }}
        shell: bash
        run: |
          set -euo pipefail
          dest="src/Core/ZVec.NET/runtimes/${{ matrix.rid }}/native"
          mkdir -p "$dest"
          shopt -s nullglob
          files=(_native_artifact/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No native files in _native_artifact for ${{ matrix.rid }}" >&2
            exit 1
          fi
          cp -f _native_artifact/* "$dest/"
          echo "Deployed ${{ matrix.rid }}:"
          ls -la "$dest"

      - name: Restore
        run: |
          dotnet restore src/Core/ZVec.NET/ZVec.NET.csproj
          dotnet restore testing/ZVec.NET.Tests/ZVec.NET.Tests.csproj

      - name: Build
        run: |
          dotnet build src/Core/ZVec.NET/ZVec.NET.csproj -c Release --no-restore
          dotnet build testing/ZVec.NET.Tests/ZVec.NET.Tests.csproj -c Release --no-restore

      - name: Test (unit + integration)
        run: dotnet test testing/ZVec.NET.Tests/ZVec.NET.Tests.csproj -c Release --no-build --logger "trx;LogFileName=test.trx"
        # Without require_native: integration Skip if RID binary missing.
        # With require_native (Pack): RID must be present; integration runs for real.

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.rid }}
          path: "**/*.trx"
          if-no-files-found: ignore
