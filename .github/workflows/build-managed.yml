name: Build Managed

on:
  push:
    branches: ["release/**"]
  pull_request:
  workflow_dispatch:
  workflow_call:
    inputs:
      require_native:
        description: Download desktop native artifact before tests (Pack CI)
        type: boolean
        default: false
        required: false

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      # Pack passes require_native=true after desktop natives upload zvec-native-{rid}.
      - name: Download native for this RID
        if: ${{ inputs.require_native == true }}
        uses: actions/download-artifact@v4
        with:
          name: zvec-native-${{ matrix.rid }}
          path: _native_artifact

      - name: Deploy native into runtimes/
        if: ${{ inputs.require_native == true }}
        shell: bash
        run: |
          set -euo pipefail
          dest="src/Core/ZVec.NET/runtimes/${{ matrix.rid }}/native"
          mkdir -p "$dest"
          shopt -s nullglob
          files=(_native_artifact/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No native files in _native_artifact for ${{ matrix.rid }}" >&2
            exit 1
          fi
          cp -f _native_artifact/* "$dest/"
          echo "Deployed ${{ matrix.rid }}:"
          ls -la "$dest"

      - name: Restore
        run: |
          dotnet restore src/Core/ZVec.NET/ZVec.NET.csproj
          dotnet restore testing/ZVec.NET.Tests/ZVec.NET.Tests.csproj

      - name: Build
        run: |
          dotnet build src/Core/ZVec.NET/ZVec.NET.csproj -c Release --no-restore
          dotnet build testing/ZVec.NET.Tests/ZVec.NET.Tests.csproj -c Release --no-restore

      - name: Assert native in test output
        if: ${{ inputs.require_native == true }}
        shell: bash
        run: |
          set -euo pipefail
          rid="${{ matrix.rid }}"
          case "$rid" in
            win-*) libname="zvec_c_api.dll" ;;
            osx-*|iossimulator-*|ios-*|maccatalyst-*) libname="libzvec_c_api.dylib" ;;
            *) libname="libzvec_c_api.so" ;;
          esac
          checked=0
          for tfm_dir in testing/ZVec.NET.Tests/bin/Release/net*; do
            [ -d "$tfm_dir" ] || continue
            checked=$((checked + 1))
            candidate="$tfm_dir/runtimes/${rid}/native/${libname}"
            echo "Checking $candidate"
            if [ ! -f "$candidate" ]; then
              echo "ERROR: missing ${candidate}" >&2
              find testing/ZVec.NET.Tests/bin/Release -type f 2>/dev/null | head -n 80 || true
              exit 1
            fi
            ls -la "$candidate"
          done
          if [ "$checked" -eq 0 ]; then
            echo "ERROR: no testing/ZVec.NET.Tests/bin/Release/net* output directories" >&2
            exit 1
          fi

      - name: Test (unit + integration)
        env:
          ZVEC_REQUIRE_NATIVE: ${{ inputs.require_native == true && '1' || '0' }}
        run: dotnet test testing/ZVec.NET.Tests/ZVec.NET.Tests.csproj -c Release --no-build --logger "trx;LogFileName=test.trx"
        # Without require_native: integration Skip if RID binary missing.
        # With require_native (Pack): RID must be in test output; detection failure fails the job.

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.rid }}
          path: "**/*.trx"
          if-no-files-found: ignore
